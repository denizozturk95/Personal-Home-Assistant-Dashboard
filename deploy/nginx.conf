# Drop into /etc/nginx/sites-available/dashboard and symlink to sites-enabled/.
# LAN-only plaintext on :8080 — simpler for iOS Shortcuts (no self-signed-cert issues).
# If you want TLS, see deploy/nginx-tls.conf and install a cert iOS will trust
# (e.g. mkcert with the root CA installed as an iOS profile, or Tailscale certs).

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
